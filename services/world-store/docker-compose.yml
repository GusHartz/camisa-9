# Postgres local para dev/teste da camada de dados (SPEC-013).
#   docker compose up -d           # sobe o banco
#   export DATABASE_URL=postgres://postgres:postgres@localhost:5432/camisa9_dev
#   npm run db:migrate -w services/world-store
#   npm test
# Se a porta 5432 já estiver ocupada (outro Postgres local), suba com outra porta e
# reflita na URL — ex.:  POSTGRES_PORT=5434 docker compose up -d  +  DATABASE_URL=...:5434/...
# O CI NÃO usa este arquivo — lá o Postgres é um service container do GitHub Actions.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camisa9_dev
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d camisa9_dev']
      interval: 3s
      timeout: 3s
      retries: 15
